  const brandLight = theme.brandLight || 'var(--brand-light)';

    md: { padding: '14px 24px', fontSize: 15, borderRadius: 14 },

function QRCode({ pattern, color, size = 120 }) {
  // Generate a visual QR-like pattern from the pattern seed
  const seed = pattern === 'italian' ? 0xAB12 : 0xCD34;
  const cells = 21;
  const grid = [];
  for (let r = 0; r < cells; r++) {
    for (let c = 0; c < cells; c++) {
      // Finder patterns (corners)
      const inFinder = (r < 8 && c < 8) || (r < 8 && c >= cells-8) || (r >= cells-8 && c < 8);
      // Timing patterns
      const inTiming = (r === 6 && c > 7 && c < cells-8) || (c === 6 && r > 7 && r < cells-8);
      // Data cells - pseudo-random based on seed
      const hash = ((seed ^ (r * 31 + c * 17)) * 0x9E3779B9) >>> 0;
      const isData = !inFinder && !inTiming && (hash % 3 !== 0);
      grid.push({ r, c, filled: inFinder || inTiming || isData });
    }
  }
  const cellSize = size / cells;

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} xmlns="http://www.w3.org/2000/svg">
      {/* White background */}
      <rect width={size} height={size} fill="white" rx="4" />
      {/* Data cells */}
      {grid.map(({ r, c, filled }) => filled && (
        <rect key={`${r}-${c}`} x={c * cellSize} y={r * cellSize} width={cellSize} height={cellSize} fill={color} />
      ))}
      {/* Finder pattern overlays - proper QR corners */}
      {[[0,0],[0,cells-7],[cells-7,0]].map(([fr, fc], i) => (
        <g key={i}>
          <rect x={fc*cellSize} y={fr*cellSize} width={7*cellSize} height={7*cellSize} fill={color} rx={2} />
          <rect x={(fc+1)*cellSize} y={(fr+1)*cellSize} width={5*cellSize} height={5*cellSize} fill="white" rx={1} />
          <rect x={(fc+2)*cellSize} y={(fr+2)*cellSize} width={3*cellSize} height={3*cellSize} fill={color} rx={1} />
        </g>
      ))}
    </svg>
  );
}

// Auth Screen
function AuthScreen({ onBack, onSuccess, config }) {
  const theme = useTheme() || {};
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  async function handleSubmit() {
    setError(''); setLoading(true);
    await new Promise(r => setTimeout(r, 400));
    try {
      const users = DB.get('users_'+config.id, {});
      if (mode === 'login') {
        const u = Object.values(users).find(u => u.email === email && u.password === password);
        if (!u) throw new Error('Invalid email or password');
        onSuccess({ uid: u.uid, email, name: u.name, isGuest: false });
      } else {
        if (!name.trim()) throw new Error('Please enter your name');
        if (Object.values(users).find(u => u.email === email)) throw new Error('Email already registered');
        const uid = DB.id();
        users[uid] = { uid, email, password, name };
        DB.set('users_'+config.id, users);
        onSuccess({ uid, email, name, isGuest: false });
      }
    } catch (e) { setError(e.message); }
    setLoading(false);
  }

  return (
    <div className="fade-up" style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', padding: 24, background: 'var(--surface)' }}>
      <BackBtn onClick={onBack} label="Welcome" />
      <div style={{ height: 28 }} />
      <div style={{ fontSize: 36, marginBottom: 12 }}>{config.logo}</div>
      <h2 style={{ fontFamily: 'Playfair Display', fontSize: 28, marginBottom: 6 }}>{mode === 'login' ? 'Welcome back' : 'Create account'}</h2>
      <p style={{ color: 'var(--text2)', marginBottom: 32, fontSize: 14 }}>{mode === 'login' ? 'Sign in to save your orders & preferences' : 'Join to save your orders & preferences'}</p>
      {mode === 'register' && <Input label="Your name" value={name} onChange={setName} placeholder="John Doe" />}
      <Input label="Email" value={email} onChange={setEmail} type="email" placeholder="you@example.com" />
      <Input label="Password" value={password} onChange={setPassword} type="password" placeholder="••••••••" error={error} />
      <Btn onClick={handleSubmit} disabled={loading || !email || !password}>{loading ? 'Please wait…' : mode === 'login' ? 'Sign In' : 'Create Account'}</Btn>
      <button onClick={() => { setMode(m => m === 'login' ? 'register' : 'login'); setError(''); }} style={{ background: 'none', border: 'none', color: theme.brand || 'var(--brand)', fontSize: 14, marginTop: 16, cursor: 'pointer', fontFamily: 'DM Sans' }}>
        {mode === 'login' ? "Don't have an account? Sign up" : 'Already have an account? Sign in'}
      </button>
    </div>
  );
}

      {basket.length > 0 && <div style={{ position: 'fixed', bottom: 24, left: 20, right: 20 }}><Btn onClick={handleOrder} disabled={loading} size="lg" icon="🍽️">{loading?'Placing order…':'Place Order'}</Btn></div>}
    </div>
  );
}

// Order Status Screen
function OrderStatusScreen({ order, onPayment, onBack, onAddMore }) {
  const theme = useTheme() || {};
  const steps = ['pending','confirmed','preparing','ready','served'];
  const idx = steps.indexOf(order.status);
  const icons = { pending:'📋', confirmed:'✅', preparing:'👨‍🍳', ready:'🔔', served:'🍽️' };
  const labels = { pending:'Order received', confirmed:'Order confirmed', preparing:'Being prepared', ready:'Ready!', served:'Served & enjoyed' };
  return (
    <div className="fade-up" style={{ minHeight: '100vh', background: 'var(--surface)', paddingBottom: 24 }}>
      <ScreenHeader title={`Order #${order.orderNumber}`} onBack={onBack} backLabel="Orders" />
      <div style={{ padding: 20 }}>
        <p style={{ color: 'var(--text2)', fontSize: 14, marginBottom: 24 }}>We'll update you as your order progresses</p>
        <Card style={{ padding: 20, marginBottom: 16 }}>
          {steps.map((step,i) => (
            <div key={step} style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: i<steps.length-1?16:0 }}>
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                <div style={{ width: 36, height: 36, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, background: i<=idx?(theme.brand||'var(--brand)'):'var(--surface2)', color: i<=idx?'#fff':'var(--text2)', transition: 'all .4s' }}>{i<=idx?icons[step]:'○'}</div>
                {i<steps.length-1 && <div style={{ width: 2, height: 20, background: i<idx?(theme.brand||'var(--brand)'):'var(--border)', margin: '4px 0' }} />}
              </div>
              <div style={{ paddingTop: 6 }}>
                <div style={{ fontWeight: i===idx?700:400, fontSize: 14, color: i<=idx?'var(--text)':'var(--text2)' }}>{labels[step]}</div>
                {i===idx && <div style={{ fontSize: 12, color: theme.brand||'var(--brand)', marginTop: 2, animation: 'pulse 2s infinite' }}>In progress…</div>}
              </div>
            </div>
          ))}
        </Card>
        <Card style={{ padding: 16, marginBottom: 16 }}>
          <h4 style={{ fontWeight: 700, marginBottom: 12 }}>Your items</h4>
          {order.items.map(item => <div key={item.id} style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8, fontSize: 14 }}><span>{item.emoji} {item.name} x{item.qty}</span><span style={{ fontWeight: 600 }}>{fmt(item.price*item.qty)}</span></div>)}
          <div style={{ height: 1, background: 'var(--border)', margin: '12px 0' }} />
          <div style={{ display: 'flex', justifyContent: 'space-between', fontWeight: 700 }}><span>Total</span><span style={{ color: theme.brand||'var(--brand)' }}>{fmt(order.items.reduce((s,i)=>s+i.price*i.qty,0))}</span></div>
        </Card>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {order.status === 'served' && <Btn onClick={onPayment} icon="💳">Request Bill & Pay</Btn>}
          <Btn onClick={onAddMore} variant="ghost" icon="➕">Add More Items</Btn>
        </div>
      </div>
    </div>
  );
}

// Payment Screen
function PaymentScreen({ order, onBack, onSuccess }) {
  const theme = useTheme() || {};
  const [method, setMethod] = useState('card');
  const [cardNum, setCardNum] = useState('');
  const [expiry, setExpiry] = useState('');
  const [cvv, setCvv] = useState('');
  const [loading, setLoading] = useState(false);
  const total = order.items.reduce((s,i)=>s+i.price*i.qty,0);
  async function pay() { setLoading(true); await new Promise(r=>setTimeout(r,2200)); onSuccess(); setLoading(false); }
  return (
    <div className="slide-in" style={{ minHeight: '100vh', background: 'var(--surface)', paddingBottom: 120 }}>
      <ScreenHeader title="Payment" onBack={onBack} backLabel="Order" />
      <div style={{ padding: 20 }}>
        <Card style={{ padding: 16, marginBottom: 20, background: theme.brandLight||'var(--brand-light)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontSize: 14, color: 'var(--text2)' }}>Total due</span>
            <span style={{ fontFamily: 'Playfair Display', fontSize: 28, fontWeight: 700, color: theme.brand||'var(--brand)' }}>{fmt(total)}</span>
          </div>
        </Card>
        <div style={{ display: 'flex', gap: 8, marginBottom: 20 }}>
          {[['card','💳','Card'],['cash','💵','Cash'],['apple','🍎','Apple Pay']].map(([val,icon,label]) => (
            <button key={val} onClick={()=>setMethod(val)} style={{ flex: 1, padding: '12px 8px', borderRadius: 12, border: `2px solid ${method===val?(theme.brand||'var(--brand)'):'var(--border)'}`, background: method===val?(theme.brandLight||'var(--brand-light)'):'#fff', cursor: 'pointer', fontSize: 12, fontWeight: 600, fontFamily: 'DM Sans', color: method===val?(theme.brand||'var(--brand)'):'var(--text2)' }}>{icon}<br />{label}</button>
          ))}
        </div>
        {method==='card' && <Card style={{ padding: 16, marginBottom: 20 }}>
          <Input label="Card Number" value={cardNum} onChange={v=>setCardNum(v.replace(/\D/g,'').slice(0,16).replace(/(.{4})/g,'$1 ').trim())} placeholder="1234 5678 9012 3456" />
          <div style={{ display: 'flex', gap: 12 }}>
            <div style={{ flex:1 }}><Input label="Expiry" value={expiry} onChange={v=>setExpiry(v.replace(/\D/g,'').slice(0,4).replace(/(.{2})/,'$1/').slice(0,5))} placeholder="MM/YY" /></div>
            <div style={{ flex:1 }}><Input label="CVV" value={cvv} onChange={v=>setCvv(v.replace(/\D/g,'').slice(0,3))} placeholder="•••" /></div>
          </div>
        </Card>}
        {method==='cash' && <Card style={{ padding: 16, marginBottom: 20, textAlign: 'center' }}><div style={{ fontSize: 48, marginBottom: 12 }}>💵</div><p style={{ color: 'var(--text2)', fontSize: 14 }}>Please pay at the counter or ask your waiter.</p></Card>}
        {method==='apple' && <Card style={{ padding: 16, marginBottom: 20, textAlign: 'center' }}><div style={{ fontSize: 48, marginBottom: 12 }}>🍎</div><p style={{ color: 'var(--text2)', fontSize: 14 }}>Use Apple Pay on your device to confirm.</p></Card>}
      </div>
      <div style={{ position: 'fixed', bottom: 24, left: 20, right: 20 }}><Btn onClick={pay} disabled={loading} size="lg" icon={loading?null:'🔒'}>{loading?<Spinner/>:`Pay ${fmt(total)}`}</Btn></div>
    </div>
  );
}

// ─── STAFF DASHBOARD ──────────────────────────────────────────────────────────
function StaffDashboard({ onExit, restaurantId, config }) {
  const theme = useTheme() || {};
  const [orders, setOrders] = useState(() => DB.get('orders_'+restaurantId, []));
  const [calls, setCalls] = useState(() => DB.get('waiter_calls_'+restaurantId, []));
  const [filter, setFilter] = useState('active');

  useEffect(() => {
    const t = setInterval(() => {
      setOrders(DB.get('orders_'+restaurantId, []));
      setCalls(DB.get('waiter_calls_'+restaurantId, []));
    }, 2000);
    return () => clearInterval(t);
  }, []);

  function updateStatus(id, status) {
    const updated = DB.get('orders_'+restaurantId,[]).map(o=>o.id===id?{...o,status}:o);
    DB.set('orders_'+restaurantId, updated); setOrders(updated);
  }
  function dismissCall(id) {
    const updated = DB.get('waiter_calls_'+restaurantId,[]).map(c=>c.id===id?{...c,status:'dismissed'}:c);
    DB.set('waiter_calls_'+restaurantId, updated); setCalls(updated);
  }

  const pendingCalls = calls.filter(c=>c.status==='pending');
  const displayed = filter==='active' ? orders.filter(o=>o.status!=='paid') : orders.filter(o=>o.status==='paid');
  const brand = theme.brand||'var(--brand)';

  return (
    <div style={{ minHeight: '100vh', background: 'var(--surface)' }}>
      <div style={{ background: '#1A1714', padding: 20, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <div style={{ color: 'rgba(255,255,255,0.5)', fontSize: 12, marginBottom: 2 }}>{config.name}</div>
          <h2 style={{ color: '#fff', fontFamily: 'Playfair Display', fontSize: 20 }}>🍽️ Staff Dashboard</h2>
        </div>
        <button onClick={onExit} style={{ background: 'rgba(255,255,255,0.1)', color: '#fff', border: 'none', borderRadius: 10, padding: '8px 14px', cursor: 'pointer', fontSize: 13 }}>← Exit</button>
      </div>
      {/* Tabs */}
      <div style={{ display: 'flex', background: '#fff', borderBottom: '1px solid var(--border)' }}>
        {[['active','Active Orders'],['history','History'],['calls','🛎️ Waiter Needed']].map(([val,label]) => (
          <button key={val} onClick={()=>setFilter(val)} style={{ flex: 1, padding: '14px 6px', border: 'none', background: 'none', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'DM Sans', borderBottom: filter===val?`3px solid ${brand}`:'3px solid transparent', color: filter===val?brand:'var(--text2)', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 4 }}>
            {label}
            {val==='calls' && pendingCalls.length>0 && <span style={{ background: 'var(--danger)', color: '#fff', borderRadius: '50%', width: 18, height: 18, fontSize: 11, fontWeight: 700, display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>{pendingCalls.length}</span>}
          </button>
        ))}
      </div>

      {/* Waiter Calls tab */}
      {filter==='calls' && (
        <div style={{ padding: 16, display: 'flex', flexDirection: 'column', gap: 12 }}>
          {pendingCalls.length===0 && <div style={{ textAlign: 'center', padding: '60px 0', color: 'var(--text2)' }}><div style={{ fontSize: 48, marginBottom: 12 }}>✅</div><p>No waiter calls right now</p></div>}
          {pendingCalls.map(call => (
            <div key={call.id} style={{ background: '#fff', border: '2px solid var(--warning)', borderRadius: 16, padding: 16, display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ width: 44, height: 44, borderRadius: 12, background: '#FEF3D0', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, flexShrink: 0 }}>🛎️</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 16 }}>Table {call.table} needs help</div>
                <div style={{ fontSize: 12, color: 'var(--text2)', marginTop: 2 }}>{new Date(call.calledAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
              </div>
              <button onClick={()=>dismissCall(call.id)} style={{ background: 'var(--success)', color: '#fff', border: 'none', borderRadius: 10, padding: '8px 14px', fontSize: 13, fontWeight: 600, cursor: 'pointer', flexShrink: 0 }}>Dismiss ✓</button>
            </div>
          ))}
        </div>
      )}

      {/* Orders tabs */}
      {filter!=='calls' && (
        <div style={{ padding: 16, display: 'flex', flexDirection: 'column', gap: 12 }}>
          {displayed.length===0 && <div style={{ textAlign: 'center', padding: '60px 0', color: 'var(--text2)' }}><div style={{ fontSize: 48, marginBottom: 12 }}>✅</div><p>{filter==='active'?'No active orders':'No paid orders yet'}</p></div>}
          {displayed.map(order => (
            <Card key={order.id} style={{ padding: 16 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                <div><span style={{ fontWeight: 700, fontSize: 16 }}>Table {order.table}</span><span style={{ color: 'var(--text2)', fontSize: 13, marginLeft: 8 }}>#{order.orderNumber}</span></div>
                <Badge color={statusColor[order.status]||'gray'}>{statusLabel[order.status]}</Badge>
              </div>
              <div style={{ fontSize: 12, color: 'var(--text2)', marginBottom: 10 }}>{new Date(order.createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}{order.notes&&<span style={{ marginLeft: 8 }}>📝 {order.notes}</span>}</div>
              {order.items.map(item => <div key={item.id} style={{ fontSize: 14, marginBottom: 4, display: 'flex', gap: 8 }}><span>{item.emoji}</span><span>{item.qty}x {item.name}</span><span style={{ color: 'var(--text2)', marginLeft: 'auto' }}>{fmt(item.price*item.qty)}</span></div>)}
              <div style={{ height: 1, background: 'var(--border)', margin: '12px 0' }} />
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ fontWeight: 700, color: brand }}>{fmt(order.items.reduce((s,i)=>s+i.price*i.qty,0))}</span>
                {nextStatus[order.status] && <button onClick={()=>updateStatus(order.id,nextStatus[order.status])} style={{ background: brand, color: '#fff', border: 'none', borderRadius: 10, padding: '8px 16px', fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>{nextLabel[order.status]} →</button>}
              </div>
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

function AdminLogin({ config, onSuccess, onBack }) {
  const theme = useTheme() || {};
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [err, setErr] = useState('');
  function tryLogin() {
    if (email === config.adminUser && pass === config.adminPass) onSuccess();
    else setErr('Incorrect email or password');
  }
  return (
    <div className="fade-up" style={{ minHeight: '100vh', background: 'var(--surface)', padding: 24 }}>
      <BackBtn onClick={onBack} label="Welcome" />
      <div style={{ height: 28 }} />
      <div style={{ fontSize: 36, marginBottom: 12 }}>{config.logo}</div>
      <h2 style={{ fontFamily: 'Playfair Display', fontSize: 26, marginBottom: 4 }}>Admin Access</h2>
      <p style={{ color: 'var(--text2)', fontSize: 14, marginBottom: 8 }}>{config.name}</p>
      <div style={{ background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 12, padding: '10px 14px', marginBottom: 24, fontSize: 13, color: 'var(--text2)' }}>
        <strong>Admin:</strong> {config.adminUser} &nbsp;·&nbsp; <strong>Pass:</strong> {config.adminPass}
      </div>
      <Input label="Admin Email" value={email} onChange={setEmail} type="email" placeholder={config.adminUser} />
      <Input label="Password" value={pass} onChange={setPass} type="password" placeholder="••••••••" error={err} />
      <Btn onClick={tryLogin}>Enter Admin Panel</Btn>
    </div>
  );
}

function AdminPanel({ config: initialConfig, restaurantId, onExit }) {
  const [tab, setTab] = useState('appearance');
  const [config, setConfigState] = useState(() => DB.get('config_'+restaurantId, initialConfig));
  const [menu, setMenuState] = useState(() => DB.get('menu_'+restaurantId, DEFAULT_MENUS[restaurantId]||[]));
  const [editItem, setEditItem] = useState(null);
  const [saved, setSaved] = useState(false);
  const theme = { brand: config.brand, brandDark: config.brandDark, brandLight: config.brandLight };

  function saveConfig(updates) {
    const newCfg = { ...config, ...updates }; setConfigState(newCfg); DB.set('config_'+restaurantId, newCfg);
    setSaved(true); setTimeout(() => setSaved(false), 2000);
  }
  function saveMenuItem(item) {
    const newMenu = item.id && menu.find(m=>m.id===item.id) ? menu.map(m=>m.id===item.id?item:m) : [...menu,{...item,id:DB.id()}];
    setMenuState(newMenu); DB.set('menu_'+restaurantId, newMenu); setEditItem(null);
  }
  function deleteItem(id) { const m = menu.filter(m=>m.id!==id); setMenuState(m); DB.set('menu_'+restaurantId, m); }
  const categories = [...new Set(menu.map(i=>i.category))];
  const brand = config.brand || 'var(--brand)';

  return (
    <ThemeCtx.Provider value={theme}>
    <div style={{ minHeight: '100vh', background: 'var(--surface)' }}>
      <div style={{ background: '#1A1714', padding: 20, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <div style={{ color: 'rgba(255,255,255,0.5)', fontSize: 12, marginBottom: 2 }}>{config.name}</div>
          <h2 style={{ color: '#fff', fontFamily: 'Playfair Display', fontSize: 20 }}>⚙️ Admin Panel</h2>
        </div>
        <button onClick={onExit} style={{ background: 'rgba(255,255,255,0.1)', color: '#fff', border: 'none', borderRadius: 10, padding: '8px 14px', cursor: 'pointer', fontSize: 13 }}>← Exit</button>
      </div>
      {saved && <div style={{ background: 'var(--success)', color: '#fff', padding: '10px 20px', fontSize: 14, textAlign: 'center' }}>✅ Saved!</div>}
      <div style={{ display: 'flex', background: '#fff', borderBottom: '1px solid var(--border)' }}>
        {[['appearance','🎨 Style'],['menu','🍽️ Menu'],['qr','📱 QR Codes']].map(([val,label]) => (
          <button key={val} onClick={()=>setTab(val)} style={{ flex: 1, padding: '14px 8px', border: 'none', background: 'none', fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'DM Sans', borderBottom: tab===val?`3px solid ${brand}`:'3px solid transparent', color: tab===val?brand:'var(--text2)' }}>{label}</button>
        ))}
      </div>
      <div style={{ padding: 16 }}>
        {tab==='appearance' && <>
          <Input label="Restaurant Name" value={config.name} onChange={v=>saveConfig({name:v})} />
          <Input label="Tagline" value={config.tagline} onChange={v=>saveConfig({tagline:v})} />
          <Input label="Logo Emoji" value={config.logo} onChange={v=>saveConfig({logo:v})} />
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text2)', marginBottom: 8 }}>Brand Color</div>
            <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
              {['#C8873A','#2D6E3A','#2D6A8F','#5B4E9E','#C04040','#1A1714','#D4956A'].map(color => (
                <div key={color} onClick={()=>saveConfig({brand:color,brandDark:color,brandLight:color+'22'})} style={{ width: 36, height: 36, borderRadius: '50%', background: color, cursor: 'pointer', border: config.brand===color?'3px solid #333':'3px solid transparent' }} />
              ))}
              <input type="color" value={config.brand||'#C8873A'} onChange={e=>saveConfig({brand:e.target.value})} style={{ width: 36, height: 36, borderRadius: '50%', border: 'none', cursor: 'pointer', padding: 0 }} />
            </div>
          </div>
        </>}
        {tab==='menu' && <>
          <Btn onClick={()=>setEditItem({name:'',category:categories[0]||'Starters',price:'',emoji:'🍽️',description:'',available:true})} style={{ marginBottom: 16 }} icon="➕">Add Item</Btn>
          {categories.map(cat => (
            <div key={cat} style={{ marginBottom: 20 }}>
              <h4 style={{ fontFamily: 'Playfair Display', fontSize: 16, marginBottom: 8, color: 'var(--text2)' }}>{cat}</h4>
              {menu.filter(i=>i.category===cat).map(item => (
                <Card key={item.id} style={{ padding: 12, marginBottom: 8 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <span style={{ fontSize: 28 }}>{item.emoji}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 600, fontSize: 14 }}>{item.name}</div>
                      <div style={{ color: 'var(--text2)', fontSize: 13 }}>{fmt(item.price)} · {item.available?'✅ Available':'❌ Hidden'}</div>
                    </div>
                    <button onClick={()=>setEditItem(item)} style={{ background: 'var(--surface2)', border: 'none', borderRadius: 8, padding: '6px 10px', cursor: 'pointer', fontSize: 13 }}>Edit</button>
                    <button onClick={()=>deleteItem(item.id)} style={{ background: '#FDEAE8', border: 'none', borderRadius: 8, padding: '6px 10px', cursor: 'pointer', fontSize: 13, color: 'var(--danger)' }}>✕</button>
                  </div>
                </Card>
              ))}
            </div>
          ))}
        </>}
        {tab==='qr' && <>
          <p style={{ color: 'var(--text2)', fontSize: 14, marginBottom: 16, lineHeight: 1.6 }}>Each table gets a unique QR code URL for <strong>{config.name}</strong>.</p>
          {[1,2,3,4,5,6].map(t => {
            const url = `${window.location.href.split('?')[0]}?r=${restaurantId}&t=${t}`;
            return (
              <Card key={t} style={{ padding: 14, marginBottom: 10 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div><div style={{ fontWeight: 600 }}>Table {t}</div><div style={{ fontSize: 11, color: 'var(--text2)', marginTop: 2 }}>…?r={restaurantId}&t={t}</div></div>
                  <button onClick={()=>navigator.clipboard?.writeText(url)} style={{ background: brand, color: '#fff', border: 'none', borderRadius: 10, padding: '8px 14px', fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>Copy</button>
                </div>
              </Card>
            );
          })}
        </>}
      </div>
      <BottomSheet open={!!editItem} onClose={()=>setEditItem(null)} title={editItem?.id?'Edit Item':'New Item'}>
        {editItem && <>
          <Input label="Name" value={editItem.name} onChange={v=>setEditItem({...editItem,name:v})} placeholder="Dish name" />
          <Input label="Description" value={editItem.description} onChange={v=>setEditItem({...editItem,description:v})} placeholder="Short description" />
          <div style={{ display: 'flex', gap: 12 }}>
            <div style={{ flex:1 }}><Input label="Price (€)" value={editItem.price} onChange={v=>setEditItem({...editItem,price:v})} type="number" placeholder="0.00" /></div>
            <div style={{ flex:1 }}><Input label="Emoji" value={editItem.emoji} onChange={v=>setEditItem({...editItem,emoji:v})} placeholder="🍽️" /></div>
          </div>
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text2)', marginBottom: 8 }}>Category</div>
            <select value={editItem.category} onChange={e=>setEditItem({...editItem,category:e.target.value})} style={{ width: '100%', padding: 14, borderRadius: 12, border: '2px solid var(--border)', fontSize: 15, fontFamily: 'DM Sans', background: '#fff' }}>
              {[...categories,'New Category'].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 20 }}>
            <input type="checkbox" checked={editItem.available} onChange={e=>setEditItem({...editItem,available:e.target.checked})} id="avail" style={{ width: 20, height: 20 }} />
            <label htmlFor="avail" style={{ fontSize: 14, fontWeight: 500 }}>Available on menu</label>
          </div>
          <Btn onClick={()=>saveMenuItem(editItem)}>Save Item</Btn>
        </>}
      </BottomSheet>
    </div>
    </ThemeCtx.Provider>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
function RestaurantApp({ restaurantId, table, onExit }) {
  const config = DB.get('config_'+restaurantId, RESTAURANTS_REGISTRY[restaurantId]);
  const theme = { brand: config.brand, brandDark: config.brandDark, brandLight: config.brandLight };

  // screens: welcome | auth | home | menu | basket | orders | orderStatus | profile | payment | paySuccess | staff | adminLogin | admin
  const [screen, setScreen] = useState('welcome');
  const [user, setUser] = useState(null);
  const [basket, setBasket] = useState([]);
  const [currentOrder, setCurrentOrder] = useState(null);
  const [orders, setOrders] = useState(() => DB.get('orders_'+restaurantId, []));
  const [menu, setMenu] = useState(() => DB.get('menu_'+restaurantId, DEFAULT_MENUS[restaurantId]||[]));
  const [toast, setToast] = useState(null);

  // Sync menu/orders on screen change
  useEffect(() => {
    setMenu(DB.get('menu_'+restaurantId, DEFAULT_MENUS[restaurantId]||[]));
    setOrders(DB.get('orders_'+restaurantId, []));
  }, [screen]);

  // Apply CSS vars
  useEffect(() => {
    document.documentElement.style.setProperty('--brand', config.brand||'#C8873A');
    document.documentElement.style.setProperty('--brand-dark', config.brandDark||'#9E621E');
    document.documentElement.style.setProperty('--brand-light', config.brandLight||'#F5E6D3');
  }, [config.brand]);

  const showToast = (msg, type='info') => setToast({ message: msg, type });

  function addToBasket(item) { setBasket(prev => { const ex=prev.find(b=>b.id===item.id); if(ex) return prev.map(b=>b.id===item.id?{...b,qty:b.qty+1}:b); return [...prev,{...item,qty:1}]; }); }
  function removeFromBasket(id) { setBasket(prev => { const ex=prev.find(b=>b.id===id); if(ex?.qty===1) return prev.filter(b=>b.id!==id); return prev.map(b=>b.id===id?{...b,qty:b.qty-1}:b); }); }

  async function placeOrder(notes) {
    const num = Math.floor(1000+Math.random()*9000);
    const order = { id: DB.id(), orderNumber: num, restaurantId, table, userId: user?.uid||'guest', items: basket, notes, status: 'pending', createdAt: new Date().toISOString() };
    const all = DB.get('orders_'+restaurantId, []); all.push(order);
    DB.set('orders_'+restaurantId, all); setOrders([...all]);
    setCurrentOrder(order); setBasket([]); setScreen('orderStatus');
    showToast('Order placed! 🎉', 'success');
    ['confirmed','preparing','ready'].forEach((status, i) => {
      setTimeout(() => {
        const upd = DB.get('orders_'+restaurantId,[]).map(o=>o.id===order.id?{...o,status}:o);
        DB.set('orders_'+restaurantId, upd); setOrders([...upd]);
        setCurrentOrder(prev=>prev?.id===order.id?{...prev,status}:prev);
      }, 6000+i*8000);
    });
  }

  function completePayment() {
    const upd = DB.get('orders_'+restaurantId,[]).map(o=>o.id===currentOrder.id?{...o,status:'paid'}:o);
    DB.set('orders_'+restaurantId, upd); setOrders([...upd]);
    setCurrentOrder(prev=>({...prev,status:'paid'})); setScreen('paySuccess');
  }

  const isUserScreen = user && !['welcome','auth','staff','adminLogin','admin','paySuccess'].includes(screen);
  const freshConfig = DB.get('config_'+restaurantId, config);

  return (
    <ThemeCtx.Provider value={theme}>
      <div style={{ maxWidth: 480, margin: '0 auto', minHeight: '100vh', position: 'relative', background: 'var(--surface)', boxShadow: '0 0 60px rgba(0,0,0,0.1)' }}>

        {/* Hidden staff buttons on welcome */}
        {screen === 'welcome' && (
          <div style={{ position: 'absolute', top: 12, right: 12, display: 'flex', gap: 8, zIndex: 50 }}>
            <button onClick={() => setScreen('adminLogin')} style={{ background: 'rgba(0,0,0,0.08)', border: 'none', borderRadius: 8, padding: '6px 10px', fontSize: 11, cursor: 'pointer', color: 'rgba(0,0,0,0.4)' }}>Admin</button>
            <button onClick={() => setScreen('staff')} style={{ background: 'rgba(0,0,0,0.08)', border: 'none', borderRadius: 8, padding: '6px 10px', fontSize: 11, cursor: 'pointer', color: 'rgba(0,0,0,0.4)' }}>Staff</button>
            <button onClick={onExit} style={{ background: 'rgba(0,0,0,0.08)', border: 'none', borderRadius: 8, padding: '6px 10px', fontSize: 11, cursor: 'pointer', color: 'rgba(0,0,0,0.4)' }}>✕</button>
          </div>
        )}

        {screen==='welcome' && <WelcomeScreen config={freshConfig} table={table} onGuest={()=>{setUser({uid:'guest',name:'Guest',isGuest:true});setScreen('home');}} onLogin={()=>setScreen('auth')} />}
        {screen==='auth' && <AuthScreen onBack={()=>setScreen('welcome')} onSuccess={u=>{setUser(u);setScreen('home');}} config={freshConfig} />}
        {screen==='home' && user && <HomeScreen user={user} config={freshConfig} table={table} onNavigate={id=>setScreen(id==='menu'?'menu':id==='orders'?'orders':'profile')} onLogout={()=>{setUser(null);setBasket([]);setCurrentOrder(null);setScreen('welcome');}} orders={orders} />}
        {screen==='orders' && user && <OrdersScreen orders={orders} user={user} onBack={()=>setScreen('home')} onViewOrder={o=>{setCurrentOrder(o);setScreen('orderStatus');}} />}
        {screen==='profile' && user && !user.isGuest && <ProfileScreen user={user} onBack={()=>setScreen('home')} onSave={u=>setUser(u)} onLogout={()=>{setUser(null);setBasket([]);setScreen('welcome');}} config={freshConfig} />}
        {screen==='menu' && user && <MenuScreen menu={menu} basket={basket} onAdd={addToBasket} onRemove={removeFromBasket} onOpenBasket={()=>setScreen('basket')} onBack={()=>setScreen('home')} config={freshConfig} />}
        {screen==='basket' && user && <BasketScreen basket={basket} onAdd={addToBasket} onRemove={removeFromBasket} onBack={()=>setScreen('menu')} onPlaceOrder={placeOrder} />}
        {screen==='orderStatus' && currentOrder && <OrderStatusScreen order={currentOrder} onPayment={()=>setScreen('payment')} onBack={()=>setScreen('orders')} onAddMore={()=>setScreen('menu')} />}
        {screen==='payment' && currentOrder && <PaymentScreen order={currentOrder} onBack={()=>setScreen('orderStatus')} onSuccess={completePayment} />}
        {screen==='paySuccess' && currentOrder && <PaymentSuccessScreen order={currentOrder} onDone={()=>{setCurrentOrder(null);setScreen('home');}} />}
        {screen==='staff' && <StaffDashboard onExit={()=>setScreen('welcome')} restaurantId={restaurantId} config={freshConfig} />}
        {screen==='adminLogin' && <AdminLogin config={freshConfig} onSuccess={()=>setScreen('admin')} onBack={()=>setScreen('welcome')} />}
        {screen==='admin' && <AdminPanel config={freshConfig} restaurantId={restaurantId} onExit={()=>setScreen('welcome')} />}

        {/* Call Waiter FAB */}
        {isUserScreen && <CallWaiterFAB table={table} restaurantId={restaurantId} />}

        {toast && <Toast message={toast.message} type={toast.type} onClose={()=>setToast(null)} />}
      </div>
    </ThemeCtx.Provider>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// ─── ROOT ─────────────────────────────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
function Root() {
  // Check URL params for direct restaurant access (real QR flow)
  const params = new URLSearchParams(window.location.search);
  const urlRestaurant = params.get('r');
  const urlTable = params.get('t') || '1';

  const [activeRestaurant, setActiveRestaurant] = useState(
    urlRestaurant && RESTAURANTS_REGISTRY[urlRestaurant] ? { id: urlRestaurant, table: urlTable } : null
  );

  function openRestaurant(id, table) {
    setActiveRestaurant({ id, table });
    // Update URL for shareability
    const url = new URL(window.location.href);
    url.searchParams.set('r', id);
    url.searchParams.set('t', table);
    window.history.pushState({}, '', url);
  }

  function exitToLanding() {
    setActiveRestaurant(null);
    const url = new URL(window.location.href);
    url.searchParams.delete('r');
    url.searchParams.delete('t');
    window.history.pushState({}, '', url);
  }

  if (activeRestaurant) {
    return <RestaurantApp restaurantId={activeRestaurant.id} table={activeRestaurant.table} onExit={exitToLanding} />;
  }

  return <QRLandingPage onScanQR={openRestaurant} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
